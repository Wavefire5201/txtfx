name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. new push to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  check:
    name: Lint, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # player-bundle.ts and public/v1/txtfx-scene.js are generated + gitignored
      # but imported by tests (html.ts/embed.ts) — generate before lint/test.
      - name: Generate player bundles
        run: bun run build:player && bun run build:embed

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test

      - name: Install Chromium (browser tests)
        run: bunx playwright install --with-deps chromium

      - name: Browser tests
        run: bun run test:browser

      - name: Build
        run: bun run build
