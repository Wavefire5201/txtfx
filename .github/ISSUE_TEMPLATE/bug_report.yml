name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the editor / load scene '...'
        2. Click '...'
        3. See the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Editor
        - Effects engine
        - Export (GIF / WebM / APNG / PNG)
        - Sharing / embed
        - Rendering (WebGL / Canvas)
        - Other / not sure
    validations:
      required: false
  - type: input
    id: env
    attributes:
      label: Browser / OS
      placeholder: e.g. Chrome 126 on macOS 14
    validations:
      required: false
  - type: input
    id: scene
    attributes:
      label: Share link (optional)
      description: A /s/<id> link that reproduces the issue helps a lot.
    validations:
      required: false
